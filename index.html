<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANBEAN</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}
header{
background:#0f172a;
padding:30px;
text-align:center;
}
h1{
margin:0;
color:#00c3ff;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#16213e;
padding:20px;
border-radius:15px;
text-align:center;
font-size:20px;
}
</style>
</head>
<body>

<header>
<h1>ANBEAN</h1>
<p>Hayatın Nabzı</p>
</header>

<div class="grid">
<div class="card">💰 Altın & Döviz</div>
<div class="card">🌦️ Hava Durumu</div>
<div class="card">⚽ Spor</div>
<div class="card">🌍 Depremler</div>
<div class="card">📢 Kamu İlanları</div>
<div class="card">🕌 Namaz Vakitleri</div>
</div>

</body>
</html>
